<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Carnet - Club dels Enigmàtics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Special Elite', cursive; background-color: #f3f4f6; }
        canvas {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            max-width: 100%; height: auto;
        }
        .loader {
            border: 3px solid #f3f3f3; border-radius: 50%; border-top: 3px solid #eab308;
            width: 20px; height: 20px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4 bg-gray-100">

    <header class="text-center mb-8">
        <h1 class="text-3xl md:text-4xl font-bold text-blue-900 mb-2">🕵️‍♂️ Centre d'Identificació</h1>
        <p class="text-gray-600">Base de Dades del Club - Connexió Segura</p>
    </header>

    <main class="w-full max-w-5xl grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
        
        <!-- COLUMNA ESQUERRA: Formulari -->
        <div class="bg-white p-6 rounded-lg shadow-lg border-t-4 border-yellow-500 relative overflow-hidden">
            <div class="absolute top-0 right-0 bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded-bl-lg flex items-center gap-1">
                Estat: <span id="systemStatus" class="font-bold text-gray-500">CONNECTANT...</span>
                <span id="statusDot" class="w-2 h-2 rounded-full bg-gray-400"></span>
            </div>

            <h2 class="text-xl font-bold mb-4 text-gray-800 border-b pb-2">Fitxa de Nou Agent</h2>
            
            <form id="agentForm" class="space-y-4">
                <div>
                    <label for="agentEmail" class="block text-sm font-medium text-gray-700">Correu Electrònic</label>
                    <input type="email" id="agentEmail" placeholder="agent@exemple.com" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 bg-gray-50 border p-2">
                </div>

                <div>
                    <label for="agentName" class="block text-sm font-medium text-gray-700">Nom en Clau</label>
                    <input type="text" id="agentName" placeholder="Ex: Agent Pi" maxlength="20" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 bg-gray-50 border p-2 text-lg font-bold text-blue-900">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="agentId" class="block text-sm font-medium text-gray-700">ID Assignat</label>
                        <input type="text" id="agentId" class="mt-1 block w-full rounded-md border-gray-300 border bg-gray-100 p-2 text-center text-gray-500 font-bold" readonly value="PENDENT...">
                    </div>
                    <div>
                        <label for="agentLevel" class="block text-sm font-medium text-gray-700">Rang Inicial</label>
                        <select id="agentLevel" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 bg-gray-50 border p-2">
                            <option value="Novell">Novell</option>
                            <option value="Investigador">Investigador</option>
                            <option value="Mestre d'Enigmes">Mestre d'Enigmes</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Foto de l'Agent</label>
                    <input type="file" id="agentPhotoInput" accept="image/*" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-yellow-500 file:text-white hover:file:bg-yellow-600"/>
                </div>

                <div class="flex items-start mt-4 bg-blue-50 p-3 rounded border border-blue-100">
                    <div class="flex items-center h-5">
                        <input id="newsletterTerms" type="checkbox" required class="focus:ring-blue-500 h-4 w-4 text-blue-600 border-gray-300 rounded">
                    </div>
                    <div class="ml-3 text-sm">
                        <label for="newsletterTerms" class="font-medium text-blue-900">Accepto unir-me al Club</label>
                        <p class="text-gray-500 text-xs">Dono permís per rebre transmissions secretes (emails) sobre nous llibres i enigmes.</p>
                    </div>
                </div>

                <div class="mt-6 pt-2 border-t border-gray-200">
                    <button type="submit" id="downloadBtn" class="w-full flex justify-center items-center gap-2 bg-blue-900 hover:bg-blue-800 text-white font-bold py-3 px-4 rounded shadow-lg transition transform hover:scale-105 disabled:opacity-50 disabled:cursor-not-allowed">
                        <span id="btnText">💾 Registrar i Descarregar Carnet</span>
                        <div id="btnLoader" class="loader hidden"></div>
                    </button>
                </div>
            </form>
        </div>

        <!-- COLUMNA DRETA: Previsualització -->
        <div class="flex flex-col items-center justify-center sticky top-4">
            <h2 class="text-xl font-bold mb-4 text-gray-800">Vista Prèvia</h2>
            <canvas id="cardCanvas" width="600" height="380" class="rounded-xl shadow-2xl bg-white"></canvas>
            <p class="text-sm text-gray-500 mt-4 text-center mx-10">Aquest carnet és personal i intransferible.</p>
        </div>
    </main>

    <div id="notification" class="fixed bottom-4 right-4 bg-blue-900 text-white px-6 py-3 rounded-lg shadow-lg transform translate-y-20 transition-transform duration-300 opacity-0 z-50"></div>

    <!-- SCRIPT PRINCIPAL (MÒDUL) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, doc, runTransaction } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // ==============================================================
        // CONFIGURACIÓ FIREBASE
        // ==============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyD4AhgeieyCI1iQSvPpFAHd3k2--CLtyc4",
            authDomain: "els-enigmatics.firebaseapp.com",
            projectId: "els-enigmatics",
            storageBucket: "els-enigmatics.firebasestorage.app",
            messagingSenderId: "860950462344",
            appId: "1:860950462344:web:36c2e5afc04f23aca9843d",
            measurementId: "G-SLM06G5XSM"
        };

        // Variables Globals i Estat
        const canvas = document.getElementById('cardCanvas');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('downloadBtn');
        const btnText = document.getElementById('btnText');
        const btnLoader = document.getElementById('btnLoader');
        
        const colors = { bg: '#161a68', gold: '#FFD700', text: '#FFFFFF' };
        let db, isFirebaseReady = false;
        
        let state = {
            name: '', email: '', id: '????', level: 'Novell',
            clubLogo: null, agentPhoto: null
        };

        // --- INICIALITZACIÓ ---
        
        // 1. Carregar Imatges Estàtiques (Logo i QR)
        const loadImages = () => {
            // Logo del Club
            const logo = new Image();
            logo.src = 'imatges/logo els enigmatics.png';
            logo.onload = () => { state.clubLogo = logo; drawCard(); };
            
            // QR Fix (generat per l'API)
            const qr = new Image();
            qr.crossOrigin = "Anonymous";
            qr.src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://elsenigmatics.netlify.app/#club&color=161a68&bgcolor=FFD700`;
            // Guardem el QR directament com a propietat de la funció draw per no embrutar l'estat global
            state.qrImage = qr; 
            qr.onload = () => drawCard();
        };

        // 2. Connectar Firebase
        try {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            isFirebaseReady = true;
            updateStatus("EN LÍNIA", "green");
            console.log("Firebase connectat.");
        } catch (e) {
            console.error("Error Firebase:", e);
            updateStatus("ERROR CONNEXIÓ", "red");
        }

        window.onload = () => {
            loadImages();
            drawCard();
        };

        // --- EVENTS ---
        ['agentName', 'agentLevel'].forEach(id => {
            document.getElementById(id).addEventListener('input', (e) => {
                if(id === 'agentName') state.name = e.target.value;
                if(id === 'agentLevel') state.level = e.target.value;
                drawCard();
            });
        });

        document.getElementById('agentPhotoInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const img = new Image();
                    img.onload = () => { state.agentPhoto = img; drawCard(); };
                    img.src = evt.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        // --- SUBMIT I LÒGICA DE NEGOCI ---
        document.getElementById('agentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            state.email = document.getElementById('agentEmail').value;
            state.name = document.getElementById('agentName').value;

            setLoading(true);

            try {
                let newId;

                if (isFirebaseReady) {
                    const counterRef = doc(db, "config", "counter");
                    newId = await runTransaction(db, async (transaction) => {
                        const counterDoc = await transaction.get(counterRef);
                        let nextId = !counterDoc.exists() ? 1973 : counterDoc.data().lastId + 1;
                        transaction.set(counterRef, { lastId: nextId }, { merge: true });
                        return nextId;
                    });

                    await addDoc(collection(db, "agents"), {
                        name: state.name,
                        email: state.email,
                        level: state.level,
                        agentId: newId,
                        joinedAt: new Date(),
                        userAgent: navigator.userAgent
                    });
                } else {
                    // Fallback Offline
                    await new Promise(r => setTimeout(r, 800));
                    let current = parseInt(localStorage.getItem('club_enigmatics_last_id') || "1972");
                    newId = current + 1;
                    localStorage.setItem('club_enigmatics_last_id', newId);
                }

                state.id = newId.toString();
                document.getElementById('agentId').value = state.id;
                
                drawCard();
                await new Promise(r => setTimeout(r, 500));
                downloadCard();
                showNotification(`Benvingut/da, Agent #${newId}!`);

            } catch (error) {
                console.error("Error:", error);
                showNotification("Error de connexió.");
            } finally {
                setLoading(false);
            }
        });

        // --- FUNCIÓ DE DIBUIX (OPTIMITZADA) ---
        function drawCard() {
            // 1. Netejar i Fons
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = colors.bg;
            roundRect(ctx, 0, 0, canvas.width, canvas.height, 20, true);
            
            // 2. Marcs
            ctx.lineWidth = 4; ctx.strokeStyle = colors.gold; ctx.stroke(); 
            ctx.lineWidth = 1; ctx.beginPath(); ctx.rect(15, 15, canvas.width - 30, canvas.height - 30); ctx.stroke();

            // 3. Textos Principals
            ctx.fillStyle = colors.gold; ctx.font = "bold 28px 'Special Elite', monospace"; ctx.textAlign = "center";
            ctx.fillText("CLUB DELS ENIGMÀTICS", canvas.width / 2, 55);
            ctx.fillStyle = "#fff"; ctx.font = "16px 'Special Elite', monospace";
            ctx.fillText("ACREDITACIÓ OFICIAL", canvas.width / 2, 80);
            
            ctx.beginPath(); ctx.moveTo(40, 95); ctx.lineTo(canvas.width - 40, 95);
            ctx.strokeStyle = colors.gold; ctx.lineWidth = 2; ctx.stroke();

            // 4. Foto Usuari
            const photoX = 40, photoY = 120, photoSize = 130;
            ctx.save();
            ctx.fillStyle = "#eee"; ctx.fillRect(photoX, photoY, photoSize, photoSize);
            
            if (state.agentPhoto) {
                ctx.beginPath(); ctx.rect(photoX, photoY, photoSize, photoSize); ctx.clip();
                // "Object-fit: cover" càlcul manual
                const scale = Math.max(photoSize / state.agentPhoto.width, photoSize / state.agentPhoto.height);
                const x = photoX + (photoSize - state.agentPhoto.width * scale) / 2;
                const y = photoY + (photoSize - state.agentPhoto.height * scale) / 2;
                ctx.drawImage(state.agentPhoto, x, y, state.agentPhoto.width * scale, state.agentPhoto.height * scale);
            } else {
                ctx.fillStyle = "#ccc"; ctx.font = "50px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillText("?", photoX + photoSize/2, photoY + photoSize/2);
            }
            ctx.restore();
            ctx.lineWidth = 3; ctx.strokeStyle = colors.gold; ctx.strokeRect(photoX, photoY, photoSize, photoSize);

            // 5. Camps de Text
            const textX = 200; let currentY = 140;
            ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";

            const fields = [
                { label: "NOM EN CLAU:", val: state.name || "________________" },
                { label: "NIVELL D'ACCÉS:", val: state.level.toUpperCase() },
                { label: "ID AGENT:", val: "#" + state.id.padStart(4, '0') }
            ];

            fields.forEach(f => {
                ctx.fillStyle = colors.gold; ctx.font = "14px 'Special Elite'"; ctx.fillText(f.label, textX, currentY);
                ctx.fillStyle = "#fff"; ctx.font = "24px 'Special Elite'"; ctx.fillText(f.val.toUpperCase(), textX, currentY + 25);
                currentY += 60;
            });

            // 6. QR
            const qrSize = 80; const qrX = canvas.width - qrSize - 30; const qrY = canvas.height - qrSize - 30;
            ctx.fillStyle = colors.gold; ctx.fillRect(qrX - 2, qrY - 2, qrSize + 4, qrSize + 4);
            if (state.qrImage && state.qrImage.complete) {
                ctx.drawImage(state.qrImage, qrX, qrY, qrSize, qrSize);
            }

            // 7. LOGO DEL CLUB (CORRECCIÓ DE PROPORCIÓ)
            if (state.clubLogo) {
                const maxW = 70;
                const maxH = 70;
                // Calculem la ràtio per encabir-lo sense deformar
                const ratio = Math.min(maxW / state.clubLogo.width, maxH / state.clubLogo.height);
                const newW = state.clubLogo.width * ratio;
                const newH = state.clubLogo.height * ratio;
                
                // Centrem el logo en l'espai disponible a baix
                const logoX = (canvas.width - newW) / 2;
                const logoY = canvas.height - newH - 20;
                
                ctx.drawImage(state.clubLogo, logoX, logoY, newW, newH);
            } else {
                // Placeholder si encara no ha carregat
                ctx.save(); ctx.fillStyle = "rgba(255, 215, 0, 0.3)"; ctx.font = "10px Arial"; ctx.textAlign = "center";
                ctx.fillText("LOGO...", canvas.width / 2, canvas.height - 50); ctx.restore();
            }
        }

        // --- UTILITATS ---
        function updateStatus(text, color) {
            const statusEl = document.getElementById('systemStatus');
            const dotEl = document.getElementById('statusDot');
            if(statusEl && dotEl) {
                statusEl.textContent = text;
                statusEl.className = `font-bold text-${color}-600`;
                dotEl.className = `w-2 h-2 rounded-full bg-${color}-500`;
            }
        }

        function downloadCard() {
            const image = canvas.toDataURL("image/png").replace("image/png", "image/octet-stream");
            const link = document.createElement('a');
            link.download = `carnet-agent-${state.id}.png`;
            link.href = image;
            link.click();
        }

        function roundRect(ctx, x, y, width, height, radius, fill, stroke) {
            if (typeof stroke === 'undefined') stroke = true;
            if (typeof radius === 'undefined') radius = 5;
            if (typeof radius === 'number') radius = {tl: radius, tr: radius, br: radius, bl: radius};
            else { var defaultRadius = {tl: 0, tr: 0, br: 0, bl: 0}; for (var side in defaultRadius) { radius[side] = radius[side] || defaultRadius[side]; } }
            ctx.beginPath(); ctx.moveTo(x + radius.tl, y); ctx.lineTo(x + width - radius.tr, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius.tr); ctx.lineTo(x + width, y + height - radius.br);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius.br, y + height); ctx.lineTo(x + radius.bl, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius.bl); ctx.lineTo(x, y + radius.tl);
            ctx.quadraticCurveTo(x, y, x + radius.tl, y); ctx.closePath();
            if (fill) ctx.fill(); if (stroke) ctx.stroke();
        }

        function showNotification(msg) {
            const notif = document.getElementById('notification');
            notif.textContent = msg;
            notif.classList.remove('opacity-0', 'translate-y-20');
            setTimeout(() => { notif.classList.add('opacity-0', 'translate-y-20'); }, 3000);
        }

        function setLoading(isLoading) {
            btn.disabled = isLoading;
            btnText.textContent = isLoading ? "Processant..." : "💾 Registrar i Descarregar Carnet";
            isLoading ? btnLoader.classList.remove('hidden') : btnLoader.classList.add('hidden');
        }
    </script>
</body>
</html>
